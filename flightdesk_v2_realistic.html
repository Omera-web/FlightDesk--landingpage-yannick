
<h2 class="sr-only">Animation cinématique FlightDesk — jet privé réaliste et cockpit</h2>
<div style="width:100%;background:#0a1628;border-radius:12px;overflow:hidden;aspect-ratio:16/9;position:relative;">
<canvas id="fd2" style="width:100%;height:100%;display:block;"></canvas>
</div>
<script>
(function(){
const cv=document.getElementById('fd2'),ctx=cv.getContext('2d');
let W,H,t=0,ckt=0;
const T={ext:4,zoom:3,ck:4,fade:2},TOT=13;

function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  W=r.width; H=r.height||W*9/16;
  cv.width=W; cv.height=H;
}
resize(); window.addEventListener('resize',resize);

const ease=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// Etoiles (nuit) et nuages
const stars=Array.from({length:200},(_,i)=>({
  x:(Math.sin(i*127.1)*.5+.5),
  y:(Math.sin(i*311.7)*.5+.5)*.6,
  r:.4+Math.abs(Math.sin(i*99.3))*1.2,
  ph:Math.sin(i*57.2)*Math.PI*2
}));

const clouds=Array.from({length:14},(_,i)=>({
  x:(Math.sin(i*173.1)*.5+.5),
  y:.58+(Math.sin(i*211.3)*.5+.5)*.18,
  w:.14+Math.abs(Math.sin(i*99.1))*.24,
  h:.028+Math.abs(Math.sin(i*137.3))*.038,
  spd:.00006+Math.abs(Math.sin(i*83.7))*.00007,
  bright:.7+Math.abs(Math.sin(i*61.1))*.3
}));

// ── CIEL RÉALISTE ──
function drawRealisticSky(timeOfDay){
  // timeOfDay: 0=aube, 0.5=jour, 1=crépuscule
  const isDay=timeOfDay>0.25&&timeOfDay<0.75;
  const isDusk=timeOfDay>=0.65;

  let g=ctx.createLinearGradient(0,0,0,H);
  if(isDay&&!isDusk){
    // Ciel bleu diurne
    g.addColorStop(0,'#0d3b6e');
    g.addColorStop(0.15,'#1565a8');
    g.addColorStop(0.35,'#1e7ec8');
    g.addColorStop(0.55,'#2990d8');
    g.addColorStop(0.72,'#4aaae8');
    g.addColorStop(0.85,'#72c0f0');
    g.addColorStop(0.93,'#a8d8f0');
    g.addColorStop(1,'#c8e8f8');
  } else if(isDusk){
    // Crépuscule
    g.addColorStop(0,'#06082a');
    g.addColorStop(0.2,'#0d1248');
    g.addColorStop(0.42,'#1a1860');
    g.addColorStop(0.6,'#3d1a60');
    g.addColorStop(0.72,'#7a2060');
    g.addColorStop(0.82,'#c84020');
    g.addColorStop(0.91,'#e88020');
    g.addColorStop(1,'#f0a030');
  } else {
    // Aube
    g.addColorStop(0,'#080820');
    g.addColorStop(0.3,'#0f1040');
    g.addColorStop(0.55,'#1a2870');
    g.addColorStop(0.72,'#4060c0');
    g.addColorStop(0.84,'#c07030');
    g.addColorStop(0.93,'#e09020');
    g.addColorStop(1,'#f0b030');
  }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Soleil ou lune
  if(isDay&&!isDusk){
    // Soleil
    const sX=W*0.75, sY=H*0.12;
    const sg=ctx.createRadialGradient(sX,sY,0,sX,sY,H*0.22);
    sg.addColorStop(0,'rgba(255,255,220,0.95)');
    sg.addColorStop(0.05,'rgba(255,250,200,0.8)');
    sg.addColorStop(0.15,'rgba(255,240,150,0.25)');
    sg.addColorStop(0.35,'rgba(255,220,80,0.06)');
    sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sX,sY,H*0.22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,240,0.98)';
    ctx.beginPath(); ctx.arc(sX,sY,H*0.028,0,Math.PI*2); ctx.fill();
  }
}

// Nuages blancs réalistes
function drawRealClouds(alpha){
  clouds.forEach(c=>{
    c.x-=c.spd; if(c.x+c.w<0) c.x=1+c.w;
    const cx=c.x*W, cy=c.y*H;
    // Ombre sous le nuage
    const shg=ctx.createRadialGradient(cx,cy+c.h*H*0.8,0,cx,cy+c.h*H*0.8,c.w*W*0.45);
    shg.addColorStop(0,`rgba(80,100,140,${alpha*0.12})`);
    shg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shg;
    ctx.beginPath(); ctx.ellipse(cx,cy+c.h*H*0.7,c.w*W*0.45,c.h*H*0.4,0,0,Math.PI*2); ctx.fill();

    // Volumes nuageux (plusieurs passes)
    for(let p=2;p>=0;p--){
      const r=c.w*W*(0.42+p*0.18);
      const brightness=c.bright*(1-p*0.18);
      const shade=Math.round(255*brightness);
      const a=alpha*[0.88,0.6,0.32][p];
      const cg=ctx.createRadialGradient(cx,cy-c.h*H*0.1*p,0,cx,cy,r);
      cg.addColorStop(0,`rgba(${shade},${shade},${shade},${a})`);
      cg.addColorStop(0.6,`rgba(${Math.round(shade*0.9)},${Math.round(shade*0.9)},${shade},${a*0.6})`);
      cg.addColorStop(1,'rgba(200,210,230,0)');
      ctx.fillStyle=cg;
      ctx.beginPath(); ctx.ellipse(cx,cy,r,c.h*H*(0.8+p*0.4),0,0,Math.PI*2); ctx.fill();
    }
  });
}

// Mer/terre en bas
function drawEarth(){
  const hz=H*0.82;
  // Courbure de la terre
  const eg=ctx.createLinearGradient(0,hz,0,H);
  eg.addColorStop(0,'#1a6040');
  eg.addColorStop(0.3,'#145230');
  eg.addColorStop(0.7,'#0e3d22');
  eg.addColorStop(1,'#0a2d18');
  ctx.fillStyle=eg;
  ctx.beginPath();
  ctx.moveTo(0,hz+H*0.04);
  ctx.bezierCurveTo(W*0.25,hz-H*0.01,W*0.75,hz-H*0.01,W,hz+H*0.04);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  // Halo horizon
  const hog=ctx.createLinearGradient(0,hz-H*0.08,0,hz+H*0.05);
  hog.addColorStop(0,'rgba(180,220,255,0)');
  hog.addColorStop(0.4,'rgba(160,210,250,0.18)');
  hog.addColorStop(0.7,'rgba(140,200,245,0.1)');
  hog.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hog; ctx.fillRect(0,hz-H*0.08,W,H*0.13);
}

// ── JET PRIVÉ RÉALISTE — profil ──
function drawJet(cx,cy,sc,alpha){
  ctx.save();
  ctx.translate(cx,cy);
  ctx.scale(sc,sc);
  ctx.globalAlpha=alpha;

  // Ombre portée sous l'avion
  const shadowG=ctx.createRadialGradient(0,80,0,0,80,240);
  shadowG.addColorStop(0,'rgba(0,0,0,0.18)');
  shadowG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shadowG;
  ctx.beginPath(); ctx.ellipse(0,85,220,35,0,0,Math.PI*2); ctx.fill();

  // Trainées de condensation (contrails blancs)
  for(let i=0;i<5;i++){
    const tg=ctx.createLinearGradient(260+i*70,-15,260+i*70+70,-15);
    tg.addColorStop(0,`rgba(255,255,255,${0.22-i*0.04})`);
    tg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=tg;
    ctx.beginPath(); ctx.ellipse(300+i*68,-14+i,65,4.5+i*0.8,0.018,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(300+i*68,14-i,65,4.5+i*0.8,-0.018,0,Math.PI*2); ctx.fill();
  }

  // ── FUSELAGE — blanc/gris aluminium ──
  // Corps principal
  const fTop=ctx.createLinearGradient(0,-45,0,40);
  fTop.addColorStop(0,'#f0f2f5');   // reflet ciel
  fTop.addColorStop(0.15,'#e8eaed');
  fTop.addColorStop(0.38,'#d8dadd');
  fTop.addColorStop(0.65,'#b8bbbe');
  fTop.addColorStop(0.85,'#909398');
  fTop.addColorStop(1,'#686b70');
  ctx.fillStyle=fTop;
  ctx.beginPath();
  ctx.moveTo(-310,8);
  ctx.bezierCurveTo(-298,-30,-260,-44,-215,-44);
  ctx.bezierCurveTo(-155,-44,-75,-40,-5,-36);
  ctx.bezierCurveTo(80,-32,185,-27,265,-23);
  ctx.bezierCurveTo(315,-20,348,-20,368,-18);
  ctx.lineTo(370,-10);
  ctx.bezierCurveTo(348,-10,315,-10,265,-11);
  ctx.bezierCurveTo(185,-13,80,-16,-5,-18);
  ctx.bezierCurveTo(-75,-20,-145,-22,-195,-22);
  ctx.bezierCurveTo(-238,-22,-280,-15,-302,8);
  ctx.bezierCurveTo(-295,26,-252,33,-180,35);
  ctx.bezierCurveTo(-90,37,10,34,110,30);
  ctx.bezierCurveTo(210,26,315,21,370,18);
  ctx.lineTo(370,-10);
  ctx.closePath(); ctx.fill();

  // Ligne de ceinture (stripe décorative sombre)
  const stripeG=ctx.createLinearGradient(0,-16,0,-8);
  stripeG.addColorStop(0,'rgba(30,60,120,0.55)');
  stripeG.addColorStop(0.5,'rgba(20,50,110,0.65)');
  stripeG.addColorStop(1,'rgba(10,30,80,0.4)');
  ctx.fillStyle=stripeG;
  ctx.beginPath();
  ctx.moveTo(-280,-10);
  ctx.bezierCurveTo(-150,-13,50,-16,370,-11);
  ctx.lineTo(370,-6);
  ctx.bezierCurveTo(50,-10,-150,-8,-280,-5);
  ctx.closePath(); ctx.fill();

  // Ventre plus sombre (ombre naturelle)
  const belly=ctx.createLinearGradient(0,5,0,38);
  belly.addColorStop(0,'rgba(0,0,0,0)');
  belly.addColorStop(0.5,'rgba(0,0,0,0.22)');
  belly.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle=belly;
  ctx.beginPath();
  ctx.moveTo(-295,14);
  ctx.bezierCurveTo(-250,32,-100,38,100,32);
  ctx.bezierCurveTo(250,26,340,20,370,17);
  ctx.lineTo(370,19);
  ctx.bezierCurveTo(340,22,250,28,100,34);
  ctx.bezierCurveTo(-100,40,-255,34,-298,16);
  ctx.closePath(); ctx.fill();

  // Reflet brillant sur le dessus
  const shine=ctx.createLinearGradient(-310,-44,0,-10);
  shine.addColorStop(0,'rgba(255,255,255,0)');
  shine.addColorStop(0.2,'rgba(255,255,255,0.35)');
  shine.addColorStop(0.5,'rgba(255,255,255,0.18)');
  shine.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=shine; ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(-295,-10); ctx.bezierCurveTo(-100,-38,180,-28,368,-15); ctx.stroke();

  // ── AILE — swept back ──
  const wingG=ctx.createLinearGradient(0,-50,0,60);
  wingG.addColorStop(0,'#cdd0d5');
  wingG.addColorStop(0.3,'#b8bbbe');
  wingG.addColorStop(0.7,'#909398');
  wingG.addColorStop(1,'#686b70');
  ctx.fillStyle=wingG;
  ctx.beginPath();
  ctx.moveTo(-50,-34);
  ctx.bezierCurveTo(20,-32,120,-27,230,-21);
  ctx.bezierCurveTo(300,-17,345,-15,368,-13);
  ctx.lineTo(368,-8);
  ctx.bezierCurveTo(345,-10,300,-12,220,-16);
  ctx.bezierCurveTo(110,-20,10,-20,-40,-20);
  ctx.lineTo(-50,-20);
  ctx.bezierCurveTo(-46,12,-35,38,-18,58);
  ctx.lineTo(-38,62);
  ctx.bezierCurveTo(-60,38,-74,12,-76,-16);
  ctx.closePath(); ctx.fill();

  // Ombre dessous de l'aile
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.moveTo(-50,-20); ctx.bezierCurveTo(-46,12,-35,38,-18,58);
  ctx.lineTo(-38,62); ctx.bezierCurveTo(-60,38,-74,12,-76,-16); ctx.closePath(); ctx.fill();

  // Reflet aile
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-48,-34); ctx.bezierCurveTo(120,-26,280,-17,368,-12); ctx.stroke();

  // ── MOTEURS (nacelles sous-aile) ──
  [{ox:180,oy:22},{ox:120,oy:24}].forEach(m=>{
    // Nacelle
    const nG=ctx.createLinearGradient(m.ox-50,m.oy-10,m.ox-50,m.oy+10);
    nG.addColorStop(0,'#c8cacf');
    nG.addColorStop(0.4,'#a8aaaf');
    nG.addColorStop(1,'#787b80');
    ctx.fillStyle=nG;
    ctx.beginPath(); ctx.ellipse(m.ox,m.oy,55,10,0,0,Math.PI*2); ctx.fill();
    // Entrée d'air
    const inG=ctx.createRadialGradient(m.ox-52,m.oy,0,m.ox-52,m.oy,12);
    inG.addColorStop(0,'rgba(30,35,50,0.9)');
    inG.addColorStop(0.6,'rgba(60,70,100,0.5)');
    inG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=inG; ctx.beginPath(); ctx.ellipse(m.ox-50,m.oy,10,10,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(100,110,130,0.8)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(m.ox-50,m.oy,10,10,0,0,Math.PI*2); ctx.stroke();
    // Tuyère
    const tG=ctx.createRadialGradient(m.ox+54,m.oy,0,m.ox+54,m.oy,15);
    tG.addColorStop(0,'rgba(200,180,80,0.7)');
    tG.addColorStop(0.3,'rgba(160,120,40,0.35)');
    tG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=tG; ctx.beginPath(); ctx.arc(m.ox+52,m.oy,14,0,Math.PI*2); ctx.fill();
    // Pylône moteur
    ctx.fillStyle='#a0a3a8';
    ctx.beginPath();
    ctx.moveTo(m.ox-15,-16); ctx.lineTo(m.ox+15,-16);
    ctx.lineTo(m.ox+12,m.oy-11); ctx.lineTo(m.ox-12,m.oy-11); ctx.closePath(); ctx.fill();
  });

  // ── EMPENNAGE ──
  // Dérive verticale
  const vG=ctx.createLinearGradient(305,-10,355,-95);
  vG.addColorStop(0,'#d0d3d8'); vG.addColorStop(0.5,'#c0c3c8'); vG.addColorStop(1,'#b0b3b8');
  ctx.fillStyle=vG;
  ctx.beginPath();
  ctx.moveTo(305,-18); ctx.lineTo(312,-96);
  ctx.bezierCurveTo(318,-103,334,-100,338,-92);
  ctx.lineTo(350,-18); ctx.closePath(); ctx.fill();
  // Logo FlightDesk sur dérive (petit)
  ctx.fillStyle='rgba(20,60,140,0.7)';
  ctx.beginPath(); ctx.roundRect(314,-78,28,16,3); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 9px sans-serif'; ctx.textAlign='center';
  ctx.fillText('FD',328,-67);

  // Stab horizontal
  const hG=ctx.createLinearGradient(290,-95,420,-82);
  hG.addColorStop(0,'#cdd0d5'); hG.addColorStop(1,'#b0b3b8');
  ctx.fillStyle=hG;
  ctx.beginPath();
  ctx.moveTo(292,-92); ctx.bezierCurveTo(305,-105,340,-110,400,-102);
  ctx.lineTo(404,-94); ctx.bezierCurveTo(375,-88,338,-86,308,-89); ctx.closePath(); ctx.fill();

  // ── HUBLOTS ──
  const wPos=[-228,-196,-164,-132,-100,-68,-36,-4,28,60];
  wPos.forEach((wx,i)=>{
    const wy=-27-i*0.3;
    // Cadre alu
    ctx.fillStyle='#888b90';
    ctx.beginPath(); ctx.roundRect(wx-7,wy-6.5,14,12,3); ctx.fill();
    // Vitrage
    const wg=ctx.createLinearGradient(wx-5,wy-4.5,wx+5,wy+4);
    wg.addColorStop(0,'rgba(200,225,255,0.85)');
    wg.addColorStop(0.4,'rgba(180,210,248,0.75)');
    wg.addColorStop(1,'rgba(140,185,235,0.65)');
    ctx.fillStyle=wg;
    ctx.beginPath(); ctx.roundRect(wx-5,wy-4.5,10,9,2); ctx.fill();
    // Reflet vitrage
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.roundRect(wx-4,wy-3.5,5,2.5,1); ctx.fill();
  });

  // ── COCKPIT ──
  const cwG=ctx.createLinearGradient(-285,-44,-178,-12);
  cwG.addColorStop(0,'rgba(185,215,252,0.88)');
  cwG.addColorStop(0.35,'rgba(165,200,245,0.76)');
  cwG.addColorStop(0.7,'rgba(140,180,235,0.6)');
  cwG.addColorStop(1,'rgba(110,155,220,0.4)');
  ctx.fillStyle=cwG;
  ctx.strokeStyle='rgba(150,190,240,0.7)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-284,4);
  ctx.bezierCurveTo(-276,-22,-260,-40,-238,-43);
  ctx.bezierCurveTo(-218,-46,-196,-38,-180,-26);
  ctx.lineTo(-178,-11);
  ctx.bezierCurveTo(-198,-17,-240,-17,-284,4);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Reflet cockpit (raie lumineuse)
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath();
  ctx.moveTo(-280,-1); ctx.bezierCurveTo(-272,-16,-260,-28,-244,-31);
  ctx.lineTo(-248,-23); ctx.bezierCurveTo(-260,-20,-270,-10,-276,-1); ctx.closePath(); ctx.fill();
  // Montant cockpit central
  ctx.strokeStyle='rgba(120,160,210,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-234,-43); ctx.lineTo(-234,-14); ctx.stroke();

  // ── FEUX NAVIGATION ──
  const bn=0.5+0.5*Math.abs(Math.sin(t*2.6));
  ctx.fillStyle=`rgba(255,40,60,${0.7+bn*0.3})`;
  ctx.shadowColor='#ff2040'; ctx.shadowBlur=bn*18;
  ctx.beginPath(); ctx.arc(-40,58,4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(50,255,90,0.85)';
  ctx.shadowColor='#30ff50'; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(366,-13,3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  // Strobe
  const st=Math.abs(Math.sin(t*2.6));
  ctx.fillStyle=`rgba(255,255,220,${st*0.9})`;
  ctx.beginPath(); ctx.arc(60,-33,2.5,0,Math.PI*2); ctx.fill();

  ctx.globalAlpha=1; ctx.restore();
}

// ── COCKPIT INTÉRIEUR RÉALISTE ──
function drawCockpitInterior(alpha){
  const a=clamp(alpha,0,1);

  // ── VUE FENÊTRE — ciel crépuscule ──
  const skyH=H*0.65;
  // Ciel par le pare-brise
  const sg=ctx.createLinearGradient(0,0,0,skyH);
  sg.addColorStop(0,'rgba(8,6,32,'+a+')');
  sg.addColorStop(0.25,'rgba(14,10,52,'+a+')');
  sg.addColorStop(0.48,'rgba(22,14,72,'+a+')');
  sg.addColorStop(0.65,'rgba(60,24,80,'+a+')');
  sg.addColorStop(0.78,'rgba(160,50,30,'+a+')');
  sg.addColorStop(0.88,'rgba(230,110,20,'+a+')');
  sg.addColorStop(0.94,'rgba(255,160,40,'+a+')');
  sg.addColorStop(1,'rgba(200,120,30,'+a+')');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,skyH);

  // Quelques étoiles visibles
  stars.slice(0,60).forEach(s=>{
    const tw=0.4+0.6*Math.abs(Math.sin(ckt*1.1+s.ph));
    ctx.fillStyle=`rgba(240,235,255,${a*tw*0.6})`;
    ctx.beginPath(); ctx.arc(s.x*W,s.y*skyH*0.6,s.r*.7,0,Math.PI*2); ctx.fill();
  });

  // Horizon lumineux crépuscule
  const hzY=skyH*0.83;
  const hzg=ctx.createRadialGradient(W*0.45,hzY,0,W*0.45,hzY,W*0.6);
  hzg.addColorStop(0,`rgba(255,140,30,${a*0.7})`);
  hzg.addColorStop(0.2,`rgba(220,80,20,${a*0.35})`);
  hzg.addColorStop(0.5,`rgba(180,40,60,${a*0.12})`);
  hzg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hzg; ctx.fillRect(0,hzY-skyH*0.12,W,skyH*0.2);

  // Nuages crépusculaires (silhouettes)
  clouds.slice(0,8).forEach((c,i)=>{
    const cx2=c.x*W, cy2=c.y*skyH*0.85;
    const shade=i%3===0?[180,60,20]:i%3===1?[120,30,80]:[80,20,100];
    const cg=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,c.w*W*0.4);
    cg.addColorStop(0,`rgba(${shade[0]},${shade[1]},${shade[2]},${a*c.bright*0.55})`);
    cg.addColorStop(0.5,`rgba(${shade[0]},${shade[1]},${shade[2]},${a*c.bright*0.25})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg;
    ctx.beginPath(); ctx.ellipse(cx2,cy2,c.w*W*0.42,c.h*H*0.8,0,0,Math.PI*2); ctx.fill();
    // Bord supérieur orangé (rétroéclairé)
    const top=ctx.createLinearGradient(cx2,cy2-c.h*H,cx2,cy2);
    top.addColorStop(0,`rgba(255,160,50,${a*c.bright*0.35})`);
    top.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=top;
    ctx.beginPath(); ctx.ellipse(cx2,cy2-c.h*H*0.35,c.w*W*0.32,c.h*H*0.5,0,0,Math.PI*2); ctx.fill();
  });

  // Ligne d'horizon terrestre (lueur des villes)
  const cGlow=ctx.createLinearGradient(0,hzY+skyH*0.02,0,skyH);
  cGlow.addColorStop(0,`rgba(255,150,30,${a*0.2})`);
  cGlow.addColorStop(0.4,`rgba(200,100,20,${a*0.1})`);
  cGlow.addColorStop(1,`rgba(0,0,0,${a})`);
  ctx.fillStyle=cGlow; ctx.fillRect(0,hzY,W,skyH-hzY);

  // ── TABLEAU DE BORD ──
  const dashY=H*0.67;

  // Corps du dashboard — noir/anthracite
  const dashG=ctx.createLinearGradient(0,dashY,0,H);
  dashG.addColorStop(0,'rgba(14,16,24,'+a+')');
  dashG.addColorStop(0.1,'rgba(18,20,30,'+a+')');
  dashG.addColorStop(1,'rgba(8,10,16,'+a+')');
  ctx.fillStyle=dashG;
  ctx.beginPath();
  ctx.moveTo(0,H); ctx.lineTo(0,dashY+H*0.065);
  ctx.bezierCurveTo(W*0.1,dashY-H*0.02,W*0.38,dashY-H*0.055,W/2,dashY-H*0.058);
  ctx.bezierCurveTo(W*0.62,dashY-H*0.055,W*0.9,dashY-H*0.02,W,dashY+H*0.065);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // Texture matière (petits pixels)
  ctx.fillStyle=`rgba(255,255,255,${a*0.015})`;
  for(let ix=0;ix<W;ix+=4){
    for(let iy=Math.round(dashY);iy<H;iy+=4){
      if(Math.sin(ix*73.1+iy*41.7)>0.5) ctx.fillRect(ix,iy,1,1);
    }
  }

  // Bord dashboard — reflet
  ctx.strokeStyle=`rgba(211,171,254,${a*0.15})`; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(0,dashY+H*0.065);
  ctx.bezierCurveTo(W*0.1,dashY-H*0.02,W*0.38,dashY-H*0.055,W/2,dashY-H*0.058);
  ctx.bezierCurveTo(W*0.62,dashY-H*0.055,W*0.9,dashY-H*0.02,W,dashY+H*0.065);
  ctx.stroke();

  // ── ÉCRANS PFD / MFD / EIS ──
  const sY=dashY-H*0.024, sH=H*0.225;
  const gp=W*0.014;
  const sW=(W-gp*4)/3;
  const scrns=[
    {x:gp,           w:sW,lbl:'PFD',rgb:[0,180,240],type:'pfd'},
    {x:gp*2+sW,      w:sW,lbl:'MFD · FlightDesk AI',rgb:[211,171,254],type:'mfd'},
    {x:gp*3+sW*2,    w:sW,lbl:'EIS',rgb:[251,191,36],type:'eis'},
  ];
  scrns.forEach(sc=>{
    const [r,g2,b]=sc.rgb;
    ctx.fillStyle=`rgba(4,6,18,${a*0.96})`; ctx.fillRect(sc.x,sY,sc.w,sH);
    ctx.strokeStyle=`rgba(${r},${g2},${b},${a*0.55})`; ctx.lineWidth=1.2; ctx.strokeRect(sc.x,sY,sc.w,sH);
    // Header
    ctx.fillStyle=`rgba(${r},${g2},${b},${a*0.08})`; ctx.fillRect(sc.x,sY,sc.w,sH*0.11);
    ctx.fillStyle=`rgba(${r},${g2},${b},${a*0.88})`; ctx.font=`600 ${Math.round(sH*0.082)}px DM Sans,monospace`; ctx.textAlign='left';
    ctx.fillText(sc.lbl,sc.x+7,sY+sH*0.085);

    if(sc.type==='pfd'){
      const iX=sc.x+sc.w*0.14,iY=sY+sH*0.13,iW=sc.w*0.72,iH=sH*0.66;
      ctx.save(); ctx.beginPath(); ctx.rect(iX,iY,iW,iH); ctx.clip();
      const pitch=Math.sin(ckt*0.25)*3;
      const roll=Math.sin(ckt*0.17)*4;
      const ppx=pitch*(iH/48);
      ctx.save(); ctx.translate(iX+iW/2,iY+iH/2); ctx.rotate(roll*Math.PI/180);
      // ADI sky
      const skyA=ctx.createLinearGradient(0,-iH,0,ppx);
      skyA.addColorStop(0,`rgba(6,28,80,${a})`); skyA.addColorStop(1,`rgba(10,42,110,${a})`);
      ctx.fillStyle=skyA; ctx.fillRect(-iW,-iH*2,iW*2,iH*2+ppx);
      // ADI ground
      const gndA=ctx.createLinearGradient(0,ppx,0,iH);
      gndA.addColorStop(0,`rgba(55,28,8,${a})`); gndA.addColorStop(1,`rgba(22,10,3,${a})`);
      ctx.fillStyle=gndA; ctx.fillRect(-iW,ppx,iW*2,iH*2);
      // Horizon line
      ctx.strokeStyle=`rgba(255,255,255,${a})`; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(-iW,ppx); ctx.lineTo(iW,ppx); ctx.stroke();
      for(let d=-20;d<=20;d+=5){
        if(d===0) continue;
        const ly=ppx-d*(iH/48);
        const ll=d%10===0?iW*.2:iW*.1;
        ctx.strokeStyle=`rgba(255,255,255,${a*(d%10===0?.5:.25)})`; ctx.lineWidth=d%10===0?1.4:0.9;
        ctx.beginPath(); ctx.moveTo(-ll/2,ly); ctx.lineTo(ll/2,ly); ctx.stroke();
      }
      ctx.restore();
      // Avion reference (amber)
      const ax=iX+iW/2,ay=iY+iH/2;
      ctx.strokeStyle=`rgba(251,191,36,${a})`; ctx.lineWidth=2.2;
      ctx.beginPath(); ctx.moveTo(ax-iW*.19,ay); ctx.lineTo(ax-iW*.07,ay);
      ctx.moveTo(ax+iW*.07,ay); ctx.lineTo(ax+iW*.19,ay); ctx.stroke();
      ctx.fillStyle=`rgba(251,191,36,${a})`; ctx.beginPath(); ctx.arc(ax,ay,3.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Speed
      const spd=287+Math.round(Math.sin(ckt*.28)*3);
      ctx.fillStyle=`rgba(4,8,20,${a*.92})`; ctx.fillRect(sc.x+3,sY+sH*.17,sc.w*.12,sH*.58);
      ctx.strokeStyle=`rgba(0,180,240,${a*.35})`; ctx.lineWidth=1; ctx.strokeRect(sc.x+3,sY+sH*.17,sc.w*.12,sH*.58);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.font=`600 ${Math.round(sH*.062)}px monospace`; ctx.textAlign='center';
      ctx.fillText(spd,sc.x+sc.w*.06,sY+sH*.52);
      ctx.fillStyle=`rgba(0,180,240,${a*.7})`; ctx.font=`400 ${Math.round(sH*.045)}px monospace`;
      ctx.fillText('KTS',sc.x+sc.w*.06,sY+sH*.21);
      // Alt
      const alt=8450+Math.round(Math.sin(ckt*.19)*35);
      const atX=sc.x+sc.w-sc.w*.12-3;
      ctx.fillStyle=`rgba(4,8,20,${a*.92})`; ctx.fillRect(atX,sY+sH*.17,sc.w*.12,sH*.58);
      ctx.strokeStyle=`rgba(0,180,240,${a*.35})`; ctx.lineWidth=1; ctx.strokeRect(atX,sY+sH*.17,sc.w*.12,sH*.58);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.font=`600 ${Math.round(sH*.055)}px monospace`; ctx.textAlign='center';
      ctx.fillText(alt,atX+sc.w*.06,sY+sH*.52);
      ctx.fillStyle=`rgba(0,180,240,${a*.7})`; ctx.font=`400 ${Math.round(sH*.045)}px monospace`;
      ctx.fillText('FT',atX+sc.w*.06,sY+sH*.21);
    }
    if(sc.type==='mfd'){
      const feed=[
        {l:'EXEC',t:'workflow-001 · running',c:'211,171,254'},
        {l:'TASK',t:'doc-analysis · done ✓',c:'94,234,212'},
        {l:'AGENT',t:'supervisor · actif',c:'211,171,254'},
        {l:'ALERT',t:'anomalie · corrigée ✓',c:'94,234,212'},
        {l:'EXEC',t:'report-gen · 3/5',c:'211,171,254'},
        {l:'COMP',t:'RGPD check · OK ✓',c:'94,234,212'},
      ];
      const sc2=ckt*.45%feed.length;
      const lh=sH*.115;
      for(let i=0;i<6;i++){
        const f=feed[(Math.floor(sc2)+i)%feed.length];
        const ly=sY+sH*.17+i*lh;
        if(ly>sY+sH*.9) continue;
        ctx.fillStyle=`rgba(${f.c},${a*0.82})`; ctx.font=`400 ${Math.round(sH*.068)}px monospace`; ctx.textAlign='left';
        ctx.fillText('['+f.l+'] '+f.t,sc.x+9,ly+lh*.66);
        ctx.strokeStyle=`rgba(${f.c},${a*.06})`; ctx.lineWidth=.5;
        ctx.beginPath(); ctx.moveTo(sc.x+7,ly+lh); ctx.lineTo(sc.x+sc.w-7,ly+lh); ctx.stroke();
      }
      const curA=.4+.6*Math.abs(Math.sin(ckt*3));
      ctx.fillStyle=`rgba(211,171,254,${a*curA})`; ctx.fillRect(sc.x+9,sY+sH*.905,sc.w*.06,sH*.055);
      ctx.fillStyle=`rgba(211,171,254,${a*.6})`; ctx.font=`500 ${Math.round(sH*.058)}px monospace`; ctx.textAlign='right';
      ctx.fillText('● LIVE',sc.x+sc.w-7,sY+sH*.098);
    }
    if(sc.type==='eis'){
      const n1=91.8+Math.sin(ckt*.38)*1.5;
      const gCX=sc.x+sc.w/2,gCY=sY+sH*.46,gR=sH*.24;
      ctx.strokeStyle=`rgba(30,45,80,${a*.9})`; ctx.lineWidth=6;
      ctx.beginPath(); ctx.arc(gCX,gCY,gR,Math.PI*.75,Math.PI*2.25); ctx.stroke();
      ctx.strokeStyle=`rgba(251,191,36,${a})`; ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(gCX,gCY,gR,Math.PI*.75,Math.PI*.75+(n1/100)*Math.PI*1.5); ctx.stroke();
      ctx.fillStyle=`rgba(251,191,36,${a})`; ctx.font=`700 ${Math.round(sH*.12)}px monospace`; ctx.textAlign='center';
      ctx.fillText(n1.toFixed(1)+'%',gCX,gCY+4);
      ctx.fillStyle=`rgba(251,191,36,${a*.6})`; ctx.font=`400 ${Math.round(sH*.062)}px monospace`;
      ctx.fillText('N1',gCX,gCY+sH*.14);
      const rows=[['ITT','778°C','251,191,36'],['Ng','98.1%','0,180,240'],['TRQ','73%','94,234,212']];
      rows.forEach(([l,v,c],i)=>{
        const ry=sY+sH*.77+i*sH*.072;
        ctx.fillStyle=`rgba(${c},${a*.5})`; ctx.font=`400 ${Math.round(sH*.06)}px monospace`; ctx.textAlign='left'; ctx.fillText(l,sc.x+7,ry);
        ctx.fillStyle=`rgba(${c},${a*.95})`; ctx.font=`600 ${Math.round(sH*.06)}px monospace`; ctx.textAlign='right'; ctx.fillText(v,sc.x+sc.w-7,ry);
      });
    }
  });

  // ── SIÈGES PILOTES ──
  const seatBase=H*0.82;
  const capW=W*0.16, capH=H*0.18;

  // Siège gauche (commandant de bord)
  [-1,1].forEach(side=>{
    const sx=W/2+side*(W*0.165);

    // Ombre siège
    const shG=ctx.createRadialGradient(sx,seatBase+capH*.5,0,sx,seatBase+capH*.5,capW*.7);
    shG.addColorStop(0,'rgba(0,0,0,0.35)'); shG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=`rgba(0,0,0,${a*.4})`; ctx.fillEllipse?ctx.fillEllipse():void 0;
    ctx.beginPath(); ctx.ellipse(sx,seatBase+capH*.8,capW*.55,capH*.15,0,0,Math.PI*2); ctx.fill();

    // Dossier
    const backG=ctx.createLinearGradient(sx-capW*.48,seatBase,sx+capW*.48,seatBase);
    backG.addColorStop(0,`rgba(28,32,48,${a})`);
    backG.addColorStop(0.15,`rgba(38,44,62,${a})`);
    backG.addColorStop(0.5,`rgba(45,52,72,${a})`);
    backG.addColorStop(0.85,`rgba(35,40,58,${a})`);
    backG.addColorStop(1,`rgba(22,26,40,${a})`);
    ctx.fillStyle=backG;
    ctx.beginPath();
    ctx.moveTo(sx-capW*.44,seatBase);
    ctx.bezierCurveTo(sx-capW*.46,seatBase-capH*.72,sx-capW*.38,seatBase-capH*.95,sx,seatBase-capH*.98);
    ctx.bezierCurveTo(sx+capW*.38,seatBase-capH*.95,sx+capW*.46,seatBase-capH*.72,sx+capW*.44,seatBase);
    ctx.closePath(); ctx.fill();

    // Appui-tête
    const headG=ctx.createLinearGradient(sx,seatBase-capH*.98,sx,seatBase-capH*.78);
    headG.addColorStop(0,`rgba(50,58,80,${a})`);
    headG.addColorStop(1,`rgba(35,42,60,${a})`);
    ctx.fillStyle=headG;
    ctx.beginPath();
    ctx.moveTo(sx-capW*.28,seatBase-capH*.78);
    ctx.bezierCurveTo(sx-capW*.32,seatBase-capH*.78,sx-capW*.32,seatBase-capH*.98,sx-capW*.22,seatBase-capH*.98);
    ctx.bezierCurveTo(sx-capW*.1,seatBase-capH*1.01,sx+capW*.1,seatBase-capH*1.01,sx+capW*.22,seatBase-capH*.98);
    ctx.bezierCurveTo(sx+capW*.32,seatBase-capH*.98,sx+capW*.32,seatBase-capH*.78,sx+capW*.28,seatBase-capH*.78);
    ctx.closePath(); ctx.fill();

    // Coutures sur le dossier
    ctx.strokeStyle=`rgba(60,70,100,${a*.8})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(sx,seatBase-capH*.15); ctx.lineTo(sx,seatBase-capH*.85); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx-capW*.25,seatBase-capH*.12); ctx.bezierCurveTo(sx-capW*.28,seatBase-capH*.5,sx-capW*.3,seatBase-capH*.7,sx-capW*.25,seatBase-capH*.85); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+capW*.25,seatBase-capH*.12); ctx.bezierCurveTo(sx+capW*.28,seatBase-capH*.5,sx+capW*.3,seatBase-capH*.7,sx+capW*.25,seatBase-capH*.85); ctx.stroke();

    // Assise
    const seatG=ctx.createLinearGradient(sx-capW*.46,seatBase,sx-capW*.46,seatBase+capH*.22);
    seatG.addColorStop(0,`rgba(40,46,66,${a})`);
    seatG.addColorStop(0.5,`rgba(32,38,56,${a})`);
    seatG.addColorStop(1,`rgba(22,26,40,${a})`);
    ctx.fillStyle=seatG;
    ctx.beginPath();
    ctx.moveTo(sx-capW*.46,seatBase);
    ctx.bezierCurveTo(sx-capW*.5,seatBase+capH*.05,sx-capW*.5,seatBase+capH*.18,sx-capW*.44,seatBase+capH*.22);
    ctx.bezierCurveTo(sx-capW*.2,seatBase+capH*.26,sx+capW*.2,seatBase+capH*.26,sx+capW*.44,seatBase+capH*.22);
    ctx.bezierCurveTo(sx+capW*.5,seatBase+capH*.18,sx+capW*.5,seatBase+capH*.05,sx+capW*.46,seatBase);
    ctx.closePath(); ctx.fill();

    // Accoudoirs
    [-1,1].forEach(as=>{
      ctx.fillStyle=`rgba(24,28,44,${a})`;
      ctx.beginPath();
      ctx.moveTo(sx+as*capW*.42,seatBase-capH*.1);
      ctx.bezierCurveTo(sx+as*capW*.52,seatBase-capH*.1,sx+as*capW*.54,seatBase+capH*.1,sx+as*capW*.5,seatBase+capH*.18);
      ctx.bezierCurveTo(sx+as*capW*.46,seatBase+capH*.22,sx+as*capW*.38,seatBase+capH*.22,sx+as*capW*.38,seatBase+capH*.1);
      ctx.lineTo(sx+as*capW*.38,seatBase-capH*.08);
      ctx.closePath(); ctx.fill();
    });

    // Harnais (ceinture de sécurité)
    ctx.strokeStyle=`rgba(180,60,60,${a*.7})`; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(sx,seatBase-capH*.6); ctx.lineTo(sx-capW*.25,seatBase+capH*.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,seatBase-capH*.6); ctx.lineTo(sx+capW*.25,seatBase+capH*.05); ctx.stroke();
    // Boucle centrale
    ctx.fillStyle=`rgba(160,140,80,${a*.8})`; ctx.beginPath(); ctx.ellipse(sx,seatBase-capH*.58,6,4,0,0,Math.PI*2); ctx.fill();
  });

  // Console centrale (entre les sièges)
  const cX=W/2;
  const consG=ctx.createLinearGradient(cX-W*.055,dashY+H*.02,cX+W*.055,dashY+H*.02);
  consG.addColorStop(0,`rgba(12,14,22,${a})`);
  consG.addColorStop(0.5,`rgba(20,24,36,${a})`);
  consG.addColorStop(1,`rgba(12,14,22,${a})`);
  ctx.fillStyle=consG;
  ctx.beginPath();
  ctx.moveTo(cX-W*.045,dashY+H*.01);
  ctx.bezierCurveTo(cX-W*.055,dashY+H*.12,cX-W*.065,H*.72,cX-W*.062,H*.88);
  ctx.bezierCurveTo(cX-W*.042,H*.9,cX+W*.042,H*.9,cX+W*.062,H*.88);
  ctx.bezierCurveTo(cX+W*.065,H*.72,cX+W*.055,dashY+H*.12,cX+W*.045,dashY+H*.01);
  ctx.closePath(); ctx.fill();
  // Manettes de gaz
  [-1,1].forEach(side=>{
    const tx=cX+side*W*.028, ty=H*.74;
    ctx.fillStyle=`rgba(30,35,55,${a})`;
    ctx.beginPath(); ctx.roundRect(tx-5,ty,10,H*.09,4); ctx.fill();
    ctx.fillStyle=`rgba(80,90,120,${a*.8})`;
    ctx.beginPath(); ctx.ellipse(tx,ty,8,5,0,0,Math.PI*2); ctx.fill();
  });

  // ── MONTANTS PARE-BRISE ──
  ctx.fillStyle=`rgba(12,14,22,${a})`;
  ctx.fillRect(0,0,W,H*.046); // glareshield
  ctx.beginPath(); // montant gauche
  ctx.moveTo(0,0); ctx.lineTo(W*.07,0); ctx.lineTo(W*.074,H*.64); ctx.lineTo(0,H*.70); ctx.closePath(); ctx.fill();
  ctx.beginPath(); // montant droit
  ctx.moveTo(W,0); ctx.lineTo(W*.93,0); ctx.lineTo(W*.926,H*.64); ctx.lineTo(W,H*.70); ctx.closePath(); ctx.fill();
  ctx.beginPath(); // montant central
  ctx.moveTo(W/2-9,H*.046); ctx.lineTo(W/2+9,H*.046); ctx.lineTo(W/2+11,H*.645); ctx.lineTo(W/2-11,H*.645); ctx.closePath(); ctx.fill();

  // Reflets piliers
  ctx.strokeStyle=`rgba(255,255,255,${a*.08})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W*.07,0); ctx.lineTo(W*.074,H*.64); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*.93,0); ctx.lineTo(W*.926,H*.64); ctx.stroke();

  // Vignette finale
  const vig=ctx.createRadialGradient(W/2,H*.32,H*.04,W/2,H*.32,H*.9);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(.58,'rgba(0,0,0,0)');
  vig.addColorStop(1,`rgba(0,0,0,${a*.9})`);
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
}

// ── RENDER ──
function draw(){
  ctx.clearRect(0,0,W,H);
  const el=t%TOT;

  if(el<T.ext){
    // Ciel bleu jour
    drawRealisticSky(0.5);
    drawRealClouds(1);
    drawEarth();
    const sc=0.44+Math.sin(t*.12)*.012;
    const jx=W*.5+Math.sin(t*.16)*W*.008;
    const jy=H*.38+Math.sin(t*.2)*H*.018;
    drawJet(jx,jy,sc,1);
  }
  else if(el<T.ext+T.zoom){
    const prog=(el-T.ext)/T.zoom;
    const ep=ease(prog);
    drawRealisticSky(0.5);
    drawRealClouds(clamp(1-ep*2,0,1));
    drawEarth();
    const jA=clamp(1-ep*2.2,0,1);
    const sc=0.44+ep*7;
    const jx=W*.5; const jy=H*.38+(H*.44-H*.38)*ep;
    if(jA>0) drawJet(jx,jy,sc,jA);
    // Vignette zoom
    const vig=ctx.createRadialGradient(W/2,H/2,H*(0.55-ep*.38),W/2,H/2,H*1.1);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(.65,`rgba(4,6,14,${ep*.5})`);
    vig.addColorStop(1,`rgba(4,6,14,${ep*.97})`);
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);
    if(ep>.5) drawCockpitInterior(clamp((ep-.5)/.5,0,1));
  }
  else if(el<T.ext+T.zoom+T.ck){
    ckt+=0.016;
    drawCockpitInterior(1);
  }
  else {
    const prog=(el-T.ext-T.zoom-T.ck)/T.fade;
    const ep=ease(prog);
    ckt+=0.016;
    drawRealisticSky(0.5);
    drawRealClouds(clamp(ep*1.5,0,1));
    drawEarth();
    const jA=clamp(ep*1.5,0,1);
    const sc=0.44+Math.sin(t*.12)*.012;
    const jx=W*.5+Math.sin(t*.16)*W*.008;
    const jy=H*.38+Math.sin(t*.2)*H*.018;
    if(jA>0) drawJet(jx,jy,sc,jA);
    const ckA=clamp(1-ep/.7,0,1);
    if(ckA>0) drawCockpitInterior(ckA);
  }
}

function animate(){ t+=.016; draw(); requestAnimationFrame(animate); }
animate();
})();
</script>
